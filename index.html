<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PumpLive Streamer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="pulse"></span>
                <h1>PUMP<span>LIVE</span></h1>
            </div>
            <div class="controls-grid">
                <div class="input-group">
                    <label>URL</label>
                    <input type="text" id="target-url" placeholder="https://example.com" value="https://google.com">
                </div>
                <div class="input-group">
                    <label>RTMP Server</label>
                    <input type="text" id="rtmp-url" placeholder="rtmp://a.rtmp.youtube.com/live2">
                </div>
                <div class="input-group">
                    <label>Key</label>
                    <input type="password" id="stream-key" placeholder="xxxx-xxxx-xxxx-xxxx">
                </div>
                <div class="button-group">
                    <button id="load-btn" class="secondary">Load Site</button>
                    <button id="stream-btn" class="primary">Start Stream</button>
                </div>
            </div>
        </header>
        
        <main id="browser-container">
            <!-- BrowserView will be placed here by Electron -->
            <div class="placeholder-msg">
                Browser window will appear here
            </div>
        </main>
        
        <footer id="status-bar">
            <div class="status-item">
                <span class="label">Status:</span>
                <span id="status-text" class="status-off">Offline</span>
            </div>
            <div class="status-item">
                <span id="error-msg" class="error"></span>
            </div>
        </footer>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
